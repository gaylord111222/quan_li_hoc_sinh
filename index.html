<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Classroom Companion</title>
<meta name="theme-color" content="#2F4538">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Classroom">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <button class="back-btn" id="backBtn" hidden aria-label="Back">‹</button>
  <h1 id="topbarTitle">Grades</h1>
</header>

<main id="app">

  <!-- GRADE LIST (roster home) -->
  <section class="screen" id="screen-grades">
    <ul class="grade-list" id="gradeList"></ul>
  </section>

  <!-- STUDENTS WITHIN A GRADE -->
  <section class="screen" id="screen-roster" hidden>
    <div class="toolbar">
      <input type="text" id="rosterSearch" placeholder="Search students…" autocomplete="off">
      <button class="btn-icon" id="addStudentBtn" aria-label="Add student">+</button>
    </div>
    <ul class="student-list" id="studentList"></ul>
    <p class="empty-state" id="rosterEmpty">No students yet. Tap + to add one.</p>
  </section>

  <!-- ATTENDANCE: GRADE PICKER -->
  <section class="screen" id="screen-attendance-grades" hidden>
    <ul class="grade-list" id="attendanceGradeList"></ul>
  </section>

  <!-- ATTENDANCE: STUDENT LIST FOR A GRADE -->
  <section class="screen" id="screen-attendance" hidden>
    <div class="toolbar">
      <input type="date" id="attendanceDate">
    </div>
    <div class="attendance-actions">
      <button class="chip" id="markAllPresent">Mark all present</button>
      <button class="chip" id="markAllAbsent">Mark all absent</button>
    </div>
    <ul class="attendance-list" id="attendanceList"></ul>
    <p class="empty-state" id="attendanceEmpty">No students in this grade yet.</p>
  </section>

  <!-- SCHEDULE SCREEN -->
  <section class="screen" id="screen-schedule" hidden>
    <div class="toolbar">
      <select id="scheduleDay">
        <option value="0">Sunday</option>
        <option value="1">Monday</option>
        <option value="2">Tuesday</option>
        <option value="3">Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
      <button class="btn-icon" id="addScheduleBtn" aria-label="Add class">+</button>
    </div>
    <ul class="schedule-list" id="scheduleList"></ul>
    <p class="empty-state" id="scheduleEmpty">No classes scheduled for this day.</p>
  </section>

  <!-- WHEEL: GRADE PICKER -->
  <section class="screen" id="screen-wheel-grades" hidden>
    <ul class="grade-list" id="wheelGradeList"></ul>
  </section>

  <!-- WHEEL: SPINNER FOR A GRADE -->
  <section class="screen" id="screen-wheel" hidden>
    <div class="wheel-stage">
      <div class="wheel-pointer">▼</div>
      <canvas id="wheelCanvas" width="320" height="320"></canvas>
      <div class="wheel-hub" id="spinBtn">SPIN</div>
    </div>
    <div class="wheel-result" id="wheelResult"></div>
    <label class="wheel-toggle">
      <input type="checkbox" id="removeOnPick">
      Remove student after picking
    </label>
    <button class="chip" id="resetWheelBtn">Reset wheel</button>
    <p class="empty-state" id="wheelEmpty">No students in this grade yet.</p>
  </section>

</main>

<nav class="tabbar">
  <button class="tab active" data-screen="grades">
    <span class="tab-icon">☰</span><span>Roster</span>
  </button>
  <button class="tab" data-screen="attendance-grades">
    <span class="tab-icon">✓</span><span>Attendance</span>
  </button>
  <button class="tab" data-screen="schedule">
    <span class="tab-icon">▦</span><span>Schedule</span>
  </button>
  <button class="tab" data-screen="wheel-grades">
    <span class="tab-icon">◎</span><span>Wheel</span>
  </button>
</nav>

<!-- ADD/EDIT STUDENT MODAL -->
<div class="modal-backdrop" id="studentModal" hidden>
  <div class="modal">
    <h2 id="studentModalTitle">Add Student</h2>
    <label>Tên học sinh <span class="req">(student name)</span>
      <input type="text" id="studentName" placeholder="e.g. Nguyễn Văn A">
    </label>
    <label>Tên phụ huynh <span class="opt">(parent name)</span>
      <input type="text" id="parentName" placeholder="e.g. Nguyễn Văn B">
    </label>
    <label>SĐT học sinh <span class="opt">(student phone)</span>
      <input type="tel" id="studentPhone" placeholder="e.g. 0901 234 567">
    </label>
    <label>SĐT phụ huynh <span class="opt">(parent phone)</span>
      <input type="tel" id="parentPhone" placeholder="e.g. 0901 234 567">
    </label>
    <label>Ghi chú <span class="opt">(notes)</span>
      <textarea id="studentNotes" placeholder="Dị ứng, chỗ ngồi, lưu ý…"></textarea>
    </label>
    <div class="modal-actions">
      <button class="btn-text danger" id="deleteStudentBtn" hidden>Delete</button>
      <div class="modal-actions-right">
        <button class="btn-text" id="cancelStudentBtn">Cancel</button>
        <button class="btn-solid" id="saveStudentBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD SCHEDULE MODAL -->
<div class="modal-backdrop" id="scheduleModal" hidden>
  <div class="modal">
    <h2>Add Class</h2>
    <label>Class / Subject name
      <input type="text" id="scheduleSubject" placeholder="e.g. Grade 7, Math">
    </label>
    <label>Start time
      <input type="time" id="scheduleStart">
    </label>
    <label>End time
      <input type="time" id="scheduleEnd">
    </label>
    <label>Room (optional)
      <input type="text" id="scheduleRoom" placeholder="e.g. Room 204">
    </label>
    <div class="modal-actions">
      <button class="btn-text danger" id="deleteScheduleBtn" hidden>Delete</button>
      <div class="modal-actions-right">
        <button class="btn-text" id="cancelScheduleBtn">Cancel</button>
        <button class="btn-solid" id="saveScheduleBtn">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
